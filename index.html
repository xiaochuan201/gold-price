<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>每日金价</title>
<style>
  :root {
    --bg: #14141f;
    --card: #1e1e2e;
    --gold: #f0c14b;
    --green: #3ecf8e;
    --red: #ff6b6b;
    --text: #e8e8ee;
    --muted: #8888a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
    min-height: 100vh;
    padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
    padding-top: calc(20px + env(safe-area-inset-top));
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  h1 { font-size: 22px; font-weight: 600; }
  h1 .dot { color: var(--gold); }
  .refresh {
    background: var(--card);
    border: none;
    color: var(--text);
    width: 40px; height: 40px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    transition: transform .4s;
  }
  .refresh.spin { transform: rotate(360deg); }
  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 22px 20px;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
  }
  .card .label { color: var(--muted); font-size: 13px; margin-bottom: 8px; letter-spacing: .5px; }
  .card .value { font-size: 34px; font-weight: 700; line-height: 1.1; }
  .card .value .unit { font-size: 16px; color: var(--muted); font-weight: 500; margin-left: 4px; }
  .card.gold .value { color: var(--gold); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid .card { margin-bottom: 0; }
  .grid .value { font-size: 26px; }
  .footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; line-height: 1.7; }
  .loading { color: var(--muted); }
  .err { color: var(--red); }
  .pulse { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
</style>
</head>
<body>
  <header>
    <h1><span class="dot">●</span> 每日金价</h1>
    <button class="refresh" id="refreshBtn" onclick="load()">↻</button>
  </header>

  <div class="card gold">
    <div class="label">黄金 · 美元/盎司</div>
    <div class="value" id="ozUsd"><span class="loading pulse">加载中…</span></div>
  </div>

  <div class="card gold">
    <div class="label">黄金 · 人民币/克</div>
    <div class="value" id="gCny"><span class="loading pulse">加载中…</span></div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">美元 → 人民币</div>
      <div class="value" id="fx"><span class="loading pulse">…</span></div>
    </div>
    <div class="card">
      <div class="label">黄金 · 美元/克</div>
      <div class="value" id="gUsd"><span class="loading pulse">…</span></div>
    </div>
  </div>

  <div class="footer" id="footer">数据加载中…</div>

<script>
const GRAMS_PER_OZ = 31.1034768; // 1 金衡盎司

function fmt(n, d = 2) {
  return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
}

async function load() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  setTimeout(() => btn.classList.remove('spin'), 400);

  try {
    const [goldRes, fxRes] = await Promise.all([
      fetch('https://api.gold-api.com/price/XAU').then(r => r.json()),
      fetch('https://open.er-api.com/v6/latest/USD').then(r => r.json())
    ]);

    const ozUsd = goldRes.price;              // 美元/盎司
    const rate  = fxRes.rates.CNY;            // 1 美元 = ? 人民币
    const gUsd  = ozUsd / GRAMS_PER_OZ;       // 美元/克
    const gCny  = gUsd * rate;                // 人民币/克

    document.getElementById('ozUsd').innerHTML = '$' + fmt(ozUsd) + '<span class="unit">/oz</span>';
    document.getElementById('gCny').innerHTML  = '¥' + fmt(gCny) + '<span class="unit">/g</span>';
    document.getElementById('fx').innerHTML    = fmt(rate, 4);
    document.getElementById('gUsd').innerHTML  = '$' + fmt(gUsd) + '<span class="unit">/g</span>';

    const goldTime = new Date(goldRes.updatedAt);
    document.getElementById('footer').innerHTML =
      '金价更新：' + goldTime.toLocaleString('zh-CN') + '<br>' +
      '汇率：' + (fxRes.time_last_update_utc || '') + '<br>' +
      '刷新于 ' + new Date().toLocaleTimeString('zh-CN');
  } catch (e) {
    document.getElementById('footer').innerHTML =
      '<span class="err">加载失败，请下拉刷新或检查网络</span><br>' + e;
  }
}

load();
// 页面重新可见时自动刷新（比如从后台切回来）
document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });
</script>
</body>
</html>
